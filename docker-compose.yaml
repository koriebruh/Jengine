name: jengine-dev

# Local dev stack per plans/docs/16-development-workflow.md §16.2 and
# plans/task/core/02. Deliberately simplified vs production: single-node
# Postgres (not Citus), single-broker Redpanda, no real Object Lock/WORM
# in MinIO. `make dev-up` / `make dev-down` wrap this file - see makefile.
# Kafka Connect + Debezium (plans/task/core/18) added below - this is now
# the one Kafka Connect cluster in this stack; task 22 (ClickHouse CDC)
# reuses it rather than standing up a second one.
#
# NOTE: filename deviates from plans/task/core/02's suggested
# deploy/docker-compose.dev.yml path - kept at repo root as
# docker-compose.yaml per this repo's actual scaffolding. Nothing in the
# design depends on the literal path, only on the services/behavior below.

services:
  postgres:
    image: postgres:16
    container_name: jengine-postgres
    restart: unless-stopped
    # wal_level=logical: required for Debezium's Postgres connector
    # (logical replication slots) - plans/task/core/18. Postgres's
    # default (replica) doesn't support this; not needed by anything
    # else in the stack, so it's scoped to this one flag rather than a
    # broader config file mount.
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jengine}
      POSTGRES_USER: ${POSTGRES_USER:-jengine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jengine_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jengine} -d ${POSTGRES_DB:-jengine}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

  redis:
    image: redis:7
    container_name: jengine-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: jengine-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Two listeners (plans/task/core/18): "external" keeps the
      # existing localhost:9092 behavior for host-machine tools
      # (go test, a native rpk CLI); "internal" is what OTHER
      # containers (kafka-connect) reach redpanda at - advertising
      # "localhost" to a different container would make it try to
      # connect to itself, not redpanda (the classic containerized-
      # Kafka advertised-listener pitfall).
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:${REDPANDA_KAFKA_PORT:-9092}
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "${REDPANDA_KAFKA_PORT:-9092}:9092"
      - "${REDPANDA_SCHEMA_REGISTRY_PORT:-8081}:8081"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - jengine-dev

  # plans/task/core/18: Kafka Connect + Debezium, bundled in one image.
  # Runs the outbox-event-router SMT reading outbox_event's CDC stream;
  # task 22 (ClickHouse sync) adds more connectors to this SAME cluster
  # rather than standing up a second one (plans/task/core/18 Common
  # Pitfalls). Not started by a bare `docker compose up` - same
  # opt-in-profile pattern as the observability stack, since it's a
  # heavier JVM process not every dev task needs running.
  kafka-connect:
    image: debezium/connect:2.7.3.Final
    container_name: jengine-kafka-connect
    profiles: ["streaming"]
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: redpanda:29092
      GROUP_ID: jengine-connect
      CONFIG_STORAGE_TOPIC: _jengine_connect_configs
      OFFSET_STORAGE_TOPIC: _jengine_connect_offsets
      STATUS_STORAGE_TOPIC: _jengine_connect_status
      # Single-node dev setup - replication factor 1 for Connect's own
      # internal topics (Redpanda's single broker can't satisfy a
      # higher RF; production would use 3).
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    ports:
      - "${KAFKA_CONNECT_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - jengine-dev

  # plans/task/core/22: analytical store fed by the SAME Kafka Connect
  # cluster above (task 18's outbox connectors + this task's table-CDC
  # connectors both run there - see kafka-connect's own comment on not
  # standing up a second cluster). Ports/credentials match .mcp.json's
  # existing mcp-clickhouse config (pre-staged since task 01, unusable
  # until now).
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: jengine-clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9004}:9000"
    environment:
      CLICKHOUSE_DB: jengine
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

  # plans/task/core/23: OPA sidecar - one process per environment here
  # (matches "opa run --server" per-pod in production), policy bundle
  # bind-mounted from deploy/opa/policies/ read-only so a policy change
  # is picked up on container restart without a rebuild.
  opa:
    image: openpolicyagent/opa:latest
    container_name: jengine-opa
    restart: unless-stopped
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policies"]
    ports:
      - "${OPA_PORT:-8181}:8181"
    volumes:
      - ./deploy/opa/policies:/policies:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8181/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

  minio:
    image: minio/minio:latest
    container_name: jengine-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-jengine}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-jengine_dev_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

  # One-shot sidecar: creates the buckets the app expects, then exits.
  # Object Lock/WORM is NOT configured here - mocked/skipped locally per
  # plans/docs/16-development-workflow.md §16.2; do not try to make this real.
  minio-init:
    image: minio/mc:latest
    container_name: jengine-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-jengine} ${MINIO_SECRET_KEY:-jengine_dev_secret} &&
      mc mb -p local/${MINIO_BUCKET_STATEMENTS:-jengine-statements} &&
      mc mb -p local/${MINIO_BUCKET_AUDIT:-jengine-audit-archive} &&
      echo 'buckets ready'
      "
    networks:
      - jengine-dev

  # plans/task/core/23: dev-mode Vault, the "fake/dev Vault" local-dev
  # story plans/docs/16-development-workflow.md §16.2 already calls for
  # (tenant secrets/tokenization vault use Vault path references, never
  # inline storage - this is what actually resolves them locally). Dev
  # mode only: in-memory, unsealed, fixed root token - never use this
  # config outside local dev.
  vault:
    image: hashicorp/vault:latest
    container_name: jengine-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-jengine-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8200/v1/sys/health?standbyok=true || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

  # Dev-only SFTP server for plans/task/core/07's SFTP connector -
  # `make seed` uploads/mounts a sample MT940 file here so the
  # SFTP+MT940 ingestion path can be exercised against real infra, not a
  # mock. atmoz/sftp is a widely-used, minimal image for exactly this
  # (test-server) purpose - not meant to represent a real bank's SFTP
  # setup.
  sftp:
    image: atmoz/sftp:latest
    container_name: jengine-sftp
    restart: unless-stopped
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - ./scripts/seed-data/incoming:/home/${SFTP_USER:-jengine}/incoming
    command: ${SFTP_USER:-jengine}:${SFTP_PASSWORD:-jengine_dev}:1001:1001:incoming
    networks:
      - jengine-dev

  # Browsable Swagger UI for gen/openapi/openapi.yaml (plans/task/core/15's
  # Connect-RPC API surface, spec generation wired in the "feat: generate
  # OpenAPI/Swagger spec" commit) - the spec file existing on disk isn't
  # the same as it being visible anywhere; this is that visibility.
  # Re-run `make proto-gen` after editing any .proto, then just refresh
  # the page - no container restart needed, the spec is bind-mounted.
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: jengine-swagger-ui
    restart: unless-stopped
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    ports:
      - "${SWAGGER_UI_PORT:-8082}:8080"
    volumes:
      - ./gen/openapi:/openapi:ro
    networks:
      - jengine-dev

  temporal:
    image: temporalio/auto-setup:latest
    container_name: jengine-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DB must be the auto-setup driver name, not the engine name - valid
      # values are mysql8/postgres12/postgres12_pgx/cassandra. Using
      # "postgresql" here crash-looped the container with "Unsupported
      # driver specified" - caught during plans/task/core/02 verification.
      DB: postgres12_pgx
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-jengine}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-jengine_dev}
      POSTGRES_SEEDS: postgres
      # No DYNAMIC_CONFIG_FILE_PATH override - that requires mounting a
      # matching file into the container, which this repo doesn't provide.
      # The image's own built-in default dynamic config is sufficient for
      # local dev, where nothing wires application code to Temporal yet
      # (plans/task/core/02 Non-Goals). Pointing at an unmounted path here
      # crash-looped the container - caught during verification.
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    networks:
      - jengine-dev
    # Best-effort healthcheck only - per task 02 Implementation Notes,
    # Temporal/Redpanda can be best-effort given slower boot; not required
    # to gate `make dev-up` the way postgres/redis/minio are.

  temporal-ui:
    image: temporalio/ui:latest
    container_name: jengine-temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"
    networks:
      - jengine-dev

  # --- Observability profile: NOT started by a bare `docker compose up` ---
  # Start explicitly with: docker compose --profile observability up -d
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jengine-jaeger
    profiles: ["observability"]
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - jengine-dev

  prometheus:
    image: prom/prometheus:latest
    container_name: jengine-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    networks:
      - jengine-dev

  grafana:
    image: grafana/grafana:latest
    container_name: jengine-grafana
    profiles: ["observability"]
    ports:
      - "3001:3000"
    networks:
      - jengine-dev

  # --- Citus profile (plans/task/core/24): NOT started by a bare
  # `docker compose up` - the default dev stack stays plain single-node
  # Postgres exactly as task 02/16 set up. Start explicitly with:
  # docker compose --profile citus up -d
  # Minimal 1-coordinator + 1-worker cluster, sufficient to prove real
  # distributed-table behavior (EXPLAIN showing single-shard pruning,
  # not a production shard count).
  citus-coordinator:
    image: citusdata/citus:12
    container_name: jengine-citus-coordinator
    profiles: ["citus"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: jengine
      POSTGRES_USER: jengine
      POSTGRES_PASSWORD: jengine_dev
    ports:
      - "${CITUS_COORDINATOR_PORT:-5433}:5432"
    volumes:
      - citus_coordinator_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jengine -d jengine"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

  citus-worker-1:
    image: citusdata/citus:12
    container_name: jengine-citus-worker-1
    profiles: ["citus"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: jengine
      POSTGRES_USER: jengine
      POSTGRES_PASSWORD: jengine_dev
    ports:
      - "${CITUS_WORKER1_PORT:-5434}:5432"
    volumes:
      - citus_worker1_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jengine -d jengine"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

  citus-worker-2:
    image: citusdata/citus:12
    container_name: jengine-citus-worker-2
    profiles: ["citus"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: jengine
      POSTGRES_USER: jengine
      POSTGRES_PASSWORD: jengine_dev
    ports:
      - "${CITUS_WORKER2_PORT:-5435}:5432"
    volumes:
      - citus_worker2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jengine -d jengine"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jengine-dev

networks:
  jengine-dev:
    name: jengine-dev

volumes:
  postgres_data:
  minio_data:
  clickhouse_data:
  citus_coordinator_data:
  citus_worker1_data:
  citus_worker2_data:
