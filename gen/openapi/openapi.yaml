          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: MatchRule
      additionalProperties: false
      description: |-
        MatchRule mirrors match_rules - rule_spec_yaml is the raw YAML/JSON the
         tenant authored (plans/docs/14-dashboard-frontend.md §14.4: MVP has no
         rule-builder UI, rules are authored "as raw YAML/JSON via API/CLI").
    jengine.v1.MintStreamTokenRequest:
      type: object
      title: MintStreamTokenRequest
      additionalProperties: false
      description: |-
        MintStreamTokenRequest/Response back the SSE gateway's auth story
         (plans/task/core/21's SSE/WS gateway subsection): browser EventSource
         can't set an Authorization header, so a short-lived, stream-scoped
         token is minted via this normal bearer-authenticated RPC, then passed
         as a query parameter to GET /v1/tenants/{tenant_id}/events/stream -
         never a long-lived API token in a URL.
    jengine.v1.MintStreamTokenResponse:
      type: object
      properties:
        token:
          type: string
          title: token
        expires_at:
          title: expires_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: MintStreamTokenResponse
      additionalProperties: false
    jengine.v1.Money:
      type: object
      properties:
        units:
          type:
            - integer
            - string
          title: units
          format: int64
        nanos:
          type: integer
          title: nanos
          format: int32
        currency_code:
          type: string
          title: currency_code
      title: Money
      additionalProperties: false
      description: |-
        Money avoids float precision issues (plans/docs/06-streaming-architecture.md
         §7.2) - units is the whole-currency-unit part, nanos is the
         fractional part in billionths (matches google.type.Money's own
         convention, reimplemented locally rather than importing the
         well-known type to avoid an extra external proto dependency for one
         message shape).
    jengine.v1.PageRequest:
      type: object
